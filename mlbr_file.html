<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mulberry · MLBR Digital File</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --fg: #ffffff;
      --accent: #e1ff00;
      --border: #2a2a2a;
      --ok: #00ff88;
      --bad: #ff3333;
      --dim: rgba(255, 255, 255, 0.5);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: "DM Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.45;
      padding: 24px 16px 48px;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    .head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 11px;
      color: var(--accent);
    }
    .head::before {
      content: "▣";
      font-size: 14px;
    }
    .rule {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }
    .panel {
      border: 1px solid var(--border);
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.02);
    }
    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }
    .mlbr-id { font-size: 15px; font-weight: 600; letter-spacing: 0.08em; word-break: break-all; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      white-space: nowrap;
    }
    .badge.ok { color: var(--ok); border-color: rgba(0, 255, 136, 0.35); animation: blink 2s ease-in-out infinite; }
    .badge.bad { color: var(--bad); border-color: rgba(255, 51, 51, 0.4); animation: none; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    td { padding: 6px 0; vertical-align: top; }
    td.k {
      width: 38%;
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding-right: 8px;
    }
    td.k::after { content: " │"; color: var(--border); }
    td.v { font-size: 12px; letter-spacing: 0.04em; word-break: break-word; }
    .meta { font-size: 11px; color: var(--dim); margin-top: 14px; }
    .meta strong { color: rgba(255, 255, 255, 0.85); font-weight: 500; }
    .auth-box {
      margin-top: 16px;
      padding: 12px 14px;
      border: 1px solid rgba(225, 255, 0, 0.25);
      background: rgba(225, 255, 0, 0.04);
      font-size: 12px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 14px;
      padding: 10px 16px;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: rgba(225, 255, 0, 0.08); }
    .err { color: var(--bad); font-size: 12px; margin-top: 12px; }
    .loading { color: var(--dim); font-size: 12px; }
    .api-hint { font-size: 10px; color: var(--dim); margin-top: 20px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">Mulberry Digital File</div>
    <div class="rule"></div>
    <div id="root" class="panel">
      <p class="loading" id="status">Se încarcă documentul…</p>
    </div>
    <p class="api-hint">API: setează <code>?api=http://127.0.0.1:9000</code> dacă pagina nu e servită de același host ca backend-ul.</p>
  </div>
  <script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var mlbr = (params.get("mlbr") || params.get("m") || "").trim();
  var apiBase = (params.get("api") || "").replace(/\/$/, "");
  if (!apiBase) {
    apiBase = window.location.origin && window.location.origin !== "null"
      ? window.location.origin
      : "http://127.0.0.1:9000";
  }
  var root = document.getElementById("root");
  var statusEl = document.getElementById("status");

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function fmtDate(iso) {
    if (!iso) return "—";
    try {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return esc(iso);
      var pad = function(n) { return n < 10 ? "0" + n : "" + n; };
      return pad(d.getUTCDate()) + "." + pad(d.getUTCMonth() + 1) + "." + d.getUTCFullYear() + " · " +
        pad(d.getUTCHours()) + ":" + pad(d.getUTCMinutes()) + " UTC";
    } catch (e) { return esc(iso); }
  }

  function row(k, v) {
    return "<tr><td class=\"k\">" + esc(k) + "</td><td class=\"v\">" + v + "</td></tr>";
  }

  if (!mlbr) {
    statusEl.textContent = "Lipsește parametrul ?mlbr= sau ?m= (MLBR-XXX)";
    return;
  }

  var url = apiBase + "/mlbr/" + encodeURIComponent(mlbr);
  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function(j) {
      var d = j.data || {};
      var valid = !!j.valid;
      var badge = valid
        ? '<span class="badge ok"><span class="dot"></span> VALID</span>'
        : '<span class="badge bad"><span class="dot"></span> INVALID</span>';

      var veh = (d.make || "") + (d.series ? " " + d.series : "") + " / " + (d.model || "");
      veh = veh.replace(/^ +| +$/g, "") || "—";

      var html = ""
        + '<div class="row-top">'
        + '<div class="mlbr-id">' + esc(j.mlbr_id || mlbr) + "</div>"
        + badge
        + "</div>"
        + '<div class="rule"></div>'
        + "<table>"
        + row("Vehicul", veh)
        + row("An", d.year != null ? esc(String(d.year)) : "—")
        + row("VIN", esc(d.vin))
        + row("Nr.", esc(d.plate || "—"))
        + row("Combustibil", esc(d.fuel || "—"))
        + "</table>"
        + '<div class="meta">'
        + '<div><strong>GENERAT</strong> · ' + fmtDate(d.generated_at) + "</div>"
        + '<div style="margin-top:6px"><strong>SEMNĂTURĂ</strong> · ' + esc(j.signature_preview || "—") + " [SHA-256 HMAC]</div>"
        + '<div style="margin-top:6px"><strong>VIZUALIZĂRI</strong> · ' + (j.views != null ? j.views : "—") + " scanări</div>"
        + "</div>"
        + '<div class="auth-box">'
        + (valid
          ? "[✓] Document autentic — verificat criptografic · imuabil."
          : "[✗] Semnătură nevalidă sau date alterate.")
        + "</div>"
        + '<a class="btn" href="mailto:contact@mulberry.ro?subject=QAuth%20request%20MLBR%20' + encodeURIComponent(j.mlbr_id || "") + '">→ Contactează proprietarul (QAuth)</a>';

      root.innerHTML = html;
    })
    .catch(function(e) {
      root.innerHTML = '<p class="err">Nu s-a putut încărca documentul. ' + esc(e.message || e) + "</p>";
    });
})();
  </script>
</body>
</html>
