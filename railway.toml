# Railway — deploy din Dockerfile
# Dashboard: variabile DATABASE_URL, JWT_SECRET, etc. (același set ca pe Vercel dacă folosești Supabase)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
