# Railway — Nixpacks + FastAPI din rădăcină (PYTHONPATH include . pentru pachetul backend).
# Nu folosi app.py Streamlit în rădăcină — Nixpacks l-ar putea alege greșit ca intrare.

[build]
builder = "nixpacks"

[deploy]
startCommand = "PYTHONPATH=$PYTHONPATH:. python backend/main.py"
healthcheckPath = "/api/health"
