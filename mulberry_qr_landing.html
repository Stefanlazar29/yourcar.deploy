<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MulberryQR · MulberryID</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --fg: #0a0a0a;
      --muted: #6b6b6b;
      --card: #ffffff;
      --accent: #e1ff00;
      --play-h: 44px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 56px;
    }
    .pz-hero {
      text-align: center;
      font-weight: 700;
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      letter-spacing: 0.02em;
      line-height: 1.15;
      margin-bottom: 8px;
      max-width: 22ch;
    }
    .pz-hero .dim { color: var(--muted); font-weight: 500; }
    .pz-lead {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      max-width: 340px;
      margin: 0 0 40px;
    }
    .pz-stage {
      width: min(100%, 320px);
      aspect-ratio: 1;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin-bottom: 32px;
    }
    #pz-qr-root { display: flex; align-items: center; justify-content: center; min-height: 200px; }
    .pz-actions {
      width: min(100%, 400px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .pz-btn-play {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 18px;
      background: var(--card);
      color: var(--fg);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .pz-btn-play:hover { background: #fafafa; border-color: rgba(0,0,0,0.2); }
    .pz-brand-logo {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .pz-brand-logo img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      display: block;
    }
    .pz-play-badge {
      height: var(--play-h);
      width: auto;
      display: block;
    }
    .pz-btn-msg {
      display: block;
      width: 100%;
      padding: 16px 20px;
      background: var(--fg);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .pz-btn-msg:hover { opacity: 0.92; }
    .pz-btn-pdf {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: var(--card);
      color: var(--fg);
      border: 1px solid rgba(0, 0, 0, 0.14);
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      font-family: inherit;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .pz-btn-pdf:hover {
      background: #fafafa;
      border-color: rgba(0, 0, 0, 0.22);
    }
    .pz-foot {
      margin-top: auto;
      padding-top: 40px;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="pz-hero">
    <span class="dim">MULBERRY</span>QR
  </div>
  <p class="pz-lead">Codul de mai jos deschide profilul public MulberryID în browser. Fără date sensibile din aplicație.</p>

  <div class="pz-stage" aria-label="Cod QR Mulberry">
    <div id="pz-qr-root"></div>
  </div>

  <div class="pz-actions">
    <a
      class="pz-btn-play"
      id="pz-play-link"
      href="https://play.google.com/store/search?q=Mulberry+car&c=apps"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span class="pz-brand-logo">
        <img src="assets/mulberry-logo.png" width="38" height="38" alt="" decoding="async" />
      </span>
      <span>vezi în Magazin Play</span>
      <img
        class="pz-play-badge"
        src="https://play.google.com/intl/ro_ro/badges/static/images/badges/ro_badge_web_generic.png"
        alt="Disponibil în Google Play"
        height="44"
        width="155"
      />
    </a>
    <a
      class="pz-btn-pdf"
      id="pz-pdf-link"
      href="#"
      target="_blank"
      rel="noopener noreferrer"
    >MulberryPDF</a>
    <a class="pz-btn-msg" id="pz-chat-link" href="mulberry_chat.html">Trimite mesaj</a>
  </div>

  <p class="pz-foot">Mulberry · identificare tehnică vehicul</p>

  <script src="js/config.js"></script>
  <script src="js/vendor/qr-code-styling.umd.js"></script>
  <script src="js/mulberry_styled_qr.js"></script>
  <script>
    (function () {
      function dirBase() {
        try {
          var path = window.location.pathname || '/';
          var i = path.lastIndexOf('/');
          return window.location.origin + (i >= 0 ? path.slice(0, i + 1) : '/');
        } catch (e) {
          return '';
        }
      }
      var p = new URLSearchParams(window.location.search);
      var u = (p.get('u') || '').trim();
      if (!u) {
        var mlbr = p.get('mlbr') || p.get('m') || '';
        if (mlbr) u = dirBase() + 'vehicle_present.html?m=' + encodeURIComponent(mlbr);
      }
      if (!u) u = dirBase() + 'mulberry.html';

      var root = document.getElementById('pz-qr-root');
      if (window.MulberryStyledQR && root) {
        window.MulberryStyledQR.paint(root, u, {
          width: 220,
          height: 220,
          backgroundColor: '#ffffff',
          foregroundColor: '#0a0a0a',
          margin: 6,
          errorCorrectionLevel: 'M'
        });
      } else if (root) {
        root.textContent = 'QR indisponibil';
      }

      var chat = document.getElementById('pz-chat-link');
      if (chat) chat.href = dirBase() + 'mulberry_chat.html';

      var pdfA = document.getElementById('pz-pdf-link');
      if (pdfA) {
        var api =
          (window.Config && window.Config.apiBaseUrl) ||
          (typeof window.API_BASE_URL !== 'undefined' && window.API_BASE_URL) ||
          'http://127.0.0.1:9000';
        pdfA.href = String(api).replace(/\/+$/, '') + '/reports/mulberry-technical-sample.pdf';
      }
    })();
  </script>
</body>
</html>
