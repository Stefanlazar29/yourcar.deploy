<!DOCTYPE html>
<html lang="ro" data-mulberry-bootstrap="1">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mulberry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loader-wrapper" class="hidden" aria-hidden="true">
    <div class="loader-content">
      <div class="mulberry-loader-rings" aria-hidden="true">
        <div class="mulberry-ring-outer"></div>
        <div class="mulberry-circle"></div>
      </div>
      <p class="mulberry-loader-caption">Sincronizare Mulberry ID...</p>
    </div>
  </div>
  <div class="app" id="app">
    <!-- Loader primul + exact restul structurii din mulberry.html original -->
    <!-- Pentru brevitate, trunchiat — scriptul de build va copia tot conținutul -->
  </div>

  <!-- PRODUCTION: Mock data + config către Railway -->
  <script src="js/mock_data.js" onerror="console.error('NU se încarcă: js/mock_data.js')"></script>
  <script src="js/config.js" onerror="console.error('NU se încarcă: js/config.js')"></script>
  
  <!-- Restul scripturilor în aceeași ordine -->
  <script src="js/mulberry_softscore_hub.js"></script>
  <script src="js/api_poll_guard.js"></script>
  <script src="js/mulberry_device.js"></script>
  <script src="js/api_client.js"></script>
  <script src="js/vendor/qrcode-scannable.min.js"></script>
  <script src="js/vendor/qr-code-styling.umd.js"></script>
  <script src="js/mulberry_styled_qr.js"></script>
  <script src="js/offline/appDB.js"></script>
  <script src="js/offline/core.js"></script>
  <script src="js/mulberry_profile_settings.js"></script>
  <script src="js/offline/auth.js"></script>
  <script src="js/offline/onboarding.js"></script>
  <script src="js/offline/reminders.js"></script>
  <script src="js/offline/partners.js"></script>
  <script src="js/offline/ai.js"></script>
  <script src="js/offline/cloud.js"></script>
  <script src="js/offline/soft.js"></script>
  <script src="js/offline/backend_bridge.js"></script>
</body>
</html>
