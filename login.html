<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exoterra ID — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="mlb-page">
  <div class="app" id="app">
    <div class="screen active" id="s-auth" style="position:relative;inset:auto;background:transparent;">
      <div class="auth-wrap" style="padding-top:24px;">
        <div class="mlb-card mlb-card--dark" style="margin-bottom:16px;padding:22px;">
          <div class="step-header" style="margin-bottom:16px;">
            <div>
              <div class="step-title" style="color:#fff;">Exoterra ID</div>
              <div class="step-sub" style="color:rgba(255,255,255,0.55);">Telefon / email + parolă</div>
            </div>
          </div>

        <div class="step-body" style="padding:0;">
          <div class="field">
            <div class="flabel">Telefon sau Email</div>
            <input class="finput" id="si-id" type="text" placeholder="+40 7XX XXX XXX sau email@exemplu.com" autocomplete="username">
            <div class="ferr" id="si-err-id"></div>
          </div>
          <div class="field">
            <div class="flabel">Parolă</div>
            <input class="finput" id="si-pass" type="password" placeholder="Parola" autocomplete="current-password">
            <div class="ferr" id="si-err-pass"></div>
          </div>

          <button class="btn btn-neon" id="btn-login" type="button">Intră în cont</button>
          <button class="btn" id="btn-register" type="button" style="margin-top:10px;">Creează cont</button>

          <div class="divider" style="margin-top:14px;"><span>viteză maximă · zero pop-up</span></div>
        </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/mulberry_device.js"></script>
  <script src="js/api_client.js"></script>
  <script>
    function showErr(id, msg) {
      var el = document.getElementById(id);
      if (el) { el.textContent = msg || ''; el.classList.toggle('show', !!msg); }
    }

    async function doLogin() {
    var ident = document.getElementById('si-id').value;
    var pass = document.getElementById('si-pass').value;
    
    if(!ident || !pass) return alert("Completează câmpurile!");

    // Folosim Mulberry LocalBase
    if (window.AppDB && typeof window.AppDB.login === 'function') {
      await window.AppDB.login(ident, pass);
    }
    window.location.href = 'mulberry.html';
   }

    async function doRegister() {
      showErr('si-err-id', '');
      showErr('si-err-pass', '');
      var ident = (document.getElementById('si-id').value || '').trim();
      var pass = document.getElementById('si-pass').value || '';
      if (!ident) { showErr('si-err-id', 'Introdu telefonul sau emailul.'); return; }
      if (!pass || pass.length < 8) { showErr('si-err-pass', 'Parola trebuie să aibă minim 8 caractere.'); return; }
      try {
        await window.api.registerFromInputs();
        window.location.href = 'mulberry.html';
      } catch (e) {
        showErr('si-err-pass', (e && e.message) ? e.message : 'Eroare la înregistrare.');
      }
    }

    document.getElementById('btn-login').addEventListener('click', doLogin);
    document.getElementById('btn-register').addEventListener('click', doRegister);
    document.getElementById('si-pass').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
